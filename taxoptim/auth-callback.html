<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Connexion en cours…</title>
  <style>
    body { margin:0; background:#f8f9fc; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Inter',sans-serif; color:#111827; }
    .wrap { text-align:center; }
    .spinner { width:36px; height:36px; border:3px solid rgba(30,58,95,0.15); border-top-color:#1e3a5f; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 1.25rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { font-size:.9rem; color:#6b7280; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>Connexion en cours…</p>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const email  = params.get('email');
  const name   = params.get('name') || '';

  if (token && email) {
    try { localStorage.setItem('gamma_user', JSON.stringify({ token, email, name })); } catch(e) {}
    const redirect = sessionStorage.getItem('gamma_auth_redirect') || 'index.html';
    sessionStorage.removeItem('gamma_auth_redirect');
    window.location.replace(redirect);
  } else {
    window.location.replace('index.html?auth_error=1');
  }
})();
</script>
</body>
</html>
